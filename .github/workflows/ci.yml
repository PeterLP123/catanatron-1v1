name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install the package and training stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/training-constraints.txt -e ".[dev,gym,colonist,tui]"
      - name: Verify imports work outside the checkout
        run: make test-installed PYTHON=python
      - name: Lint
        run: make lint PYTHON=python
      - name: Test
        run: make test PYTHON=python
