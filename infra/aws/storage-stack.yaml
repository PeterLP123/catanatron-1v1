AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Private S3 bucket for Colonist / catanatron training artifacts (runs, checkpoints,
  eval reports, teacher parquet). Attach the emitted IAM policy to EC2 instance roles
  or IAM users that train locally.

Parameters:
  ProjectName:
    Type: String
    Default: catanatron
    Description: Short name used in resource tags and the default bucket suffix.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: dev = shorter lifecycle; prod = keep more version history.

  BucketName:
    Type: String
    Default: ""
    Description: >
      Optional global-unique bucket name. Leave empty to auto-generate
      {account}-{region}-{ProjectName}-artifacts-{Environment}.

  RetainBucketOnDelete:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, CloudFormation delete keeps the bucket and its objects.

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, ""]]
  IsProd: !Equals [!Ref Environment, prod]
  RetainBucket: !Equals [!Ref RetainBucketOnDelete, "true"]

Resources:
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [RetainBucket, Retain, Delete]
    UpdateReplacePolicy: !If [RetainBucket, Retain, Delete]
    Properties:
      BucketName: !If
        - UseCustomBucketName
        - !Ref BucketName
        - !Sub "${AWS::AccountId}-${AWS::Region}-${ProjectName}-artifacts-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: ExpireOldRunVersionsDev
            Status: !If [IsProd, Disabled, Enabled]
            Prefix: runs/
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: colonist-training-artifacts

  ArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ArtifactsBucket.Arn
              - !Sub "${ArtifactsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  ArtifactsReadWritePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectName}-artifacts-${Environment}-rw"
      Description: Read/write colonist training artifacts in the project S3 bucket.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !GetAtt ArtifactsBucket.Arn
            Condition:
              StringLike:
                s3:prefix:
                  - ""
                  - "runs/*"
                  - "data/*"
                  - "models/*"
          - Sid: ObjectReadWrite
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource: !Sub "${ArtifactsBucket.Arn}/*"

Outputs:
  BucketName:
    Description: S3 bucket for runs, data, and promoted models.
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  BucketArn:
    Description: Bucket ARN (for cross-stack references).
    Value: !GetAtt ArtifactsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"

  ArtifactsPolicyArn:
    Description: Attach this managed policy to EC2 instance roles or developer IAM users.
    Value: !Ref ArtifactsReadWritePolicy
    Export:
      Name: !Sub "${AWS::StackName}-PolicyArn"

  S3Uri:
    Description: Base s3:// URI for scripts and env vars.
    Value: !Sub "s3://${ArtifactsBucket}"

  KeyPrefixes:
    Description: Recommended object key layout.
    Value: "runs/<run_id>/, data/<dataset_id>/, models/<name>/"
